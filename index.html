<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Converter</title>
</head>

<body>
    <img src="./assets/Logo-img.gif" alt="Logo-Converter" class="logo-money" />

    <main>
        <label>
            Converter <b>de:</b>
            <select class="select-currency-one">
                <option>R$ Real/BRL</option>
            </select>
        </label>

        <label>
            Converter <b>para:</b>
            <select class="select-currency-two">
                <option value="dolar">US$ Dólar/USD</option>
                <option value="euro">€ Euro/EUR</option>
                <option value="libra">£ Libra/GBP</option>
            </select>
        </label>

        <label>
            Valor:
            <input class="input-currency" placeholder="0,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="div-01">
                <img src="./assets/Real.png" alt="Logo-Real/BRL" />
                <p class="coin-one">Real</p>
                <p class="money-Real">R$0,00</p>
            </div>

            <img src="./assets/Vector.png" alt="Logo-Vector" class="img-vector" />

            <div class="div-02">
                <img src="./assets/estados-unidos.png" alt="Logo-dolar" class="currency-Img" />
                <p class="coin-two">Dólar Americano</p>
                <p class="money-Dolar">US$ 0.00</p>
            </div>

        </section>
    </main>

</body>
<script src="./scripts.js"></script>

</html>
